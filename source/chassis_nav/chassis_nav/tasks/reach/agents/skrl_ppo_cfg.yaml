# skrl PPO configuration for the chassis "reach goal point" task.
# Observation 9-D: target_in_robot_frame[dx_b, dy_b, dist_xy] (3) + chassis_vel[v, w] (2)
# + last_actions[2 frames * 2] (4). Action 2-D: (v, w). Input auto-sizes from OBSERVATIONS.
# Reference: https://skrl.readthedocs.io/en/latest/api/agents/ppo.html
seed: 42


# Models: separate Gaussian policy + deterministic value.
models:
  separate: False
  policy:  # GaussianMixin
    class: GaussianMixin
    clip_actions: False
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: -0.6931471805599453   # ln(0.5)
    network:
      - name: net
        input: OBSERVATIONS
        layers: [256, 128, 64]
        activations: elu
    output: ACTIONS
  value:  # DeterministicMixin
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: OBSERVATIONS
        layers: [256, 128, 64]
        activations: elu
    output: ONE


# Rollout memory (size auto-set to agent:rollouts).
memory:
  class: RandomMemory
  memory_size: -1


# PPO agent.
agent:
  class: PPO
  rollouts: 24
  learning_epochs: 5
  mini_batches: 4
  discount_factor: 0.99
  lambda: 0.95
  learning_rate: 3.0e-04
  learning_rate_scheduler: KLAdaptiveLR
  learning_rate_scheduler_kwargs:
    kl_threshold: 0.01
    max_lr: 1.0e-03
    min_lr: 1.0e-05
  state_preprocessor: RunningStandardScaler
  state_preprocessor_kwargs: null
  value_preprocessor: RunningStandardScaler
  value_preprocessor_kwargs: null
  random_timesteps: 0
  learning_starts: 0
  grad_norm_clip: 1.0
  ratio_clip: 0.2
  value_clip: 0.2
  clip_predicted_values: True
  entropy_loss_scale: 0.005
  value_loss_scale: 1.0
  kl_threshold: 0.0
  rewards_shaper_scale: 1.0
  time_limit_bootstrap: True
  # logging and checkpoint
  experiment:
    directory: "chassis_reach"
    experiment_name: ""
    write_interval: auto
    checkpoint_interval: auto
    wandb: false
    wandb_kwargs:
      project: "isaac_rm"


# Trainer.
trainer:
  class: SequentialTrainer
  timesteps: 60000
  environment_info: log
