# skrl PPO configuration for RM Push-Block (single right arm, 6 DOF).
# Obs 28-D: joint_pos(6)+joint_vel(6)+obj_pos(3)+goal_cmd(7)+last_action(6).
# Action 6-D: r_joint1~r_joint6 absolute joint position.
seed: 42

models:
  separate: False
  policy:
    class: GaussianMixin
    clip_actions: False
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: -0.6931471805599453   # ln(0.5)
    network:
      - name: net
        input: OBSERVATIONS
        layers: [256, 128, 64]
        activations: elu
    output: ACTIONS
  value:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: OBSERVATIONS
        layers: [256, 128, 64]
        activations: elu
    output: ONE

memory:
  class: RandomMemory
  memory_size: -1

agent:
  class: PPO
  rollouts: 24
  learning_epochs: 5
  mini_batches: 4
  discount_factor: 0.99
  lambda: 0.95
  learning_rate: 1.5e-04
  learning_rate_scheduler: KLAdaptiveLR
  learning_rate_scheduler_kwargs:
    kl_threshold: 0.01
    max_lr: 1.0e-03
    min_lr: 1.0e-05
  state_preprocessor: RunningStandardScaler
  state_preprocessor_kwargs: null
  value_preprocessor: RunningStandardScaler
  value_preprocessor_kwargs: null
  random_timesteps: 0
  learning_starts: 0
  grad_norm_clip: 1.0
  ratio_clip: 0.2
  value_clip: 0.2
  clip_predicted_values: True
  entropy_loss_scale: 0.005
  value_loss_scale: 1.0
  kl_threshold: 0.0
  rewards_shaper_scale: 1.0
  time_limit_bootstrap: True
  experiment:
    directory: "rm_push_block"
    experiment_name: ""
    write_interval: auto
    checkpoint_interval: auto
    wandb: false
    wandb_kwargs:
      project: "isaac_rm"

trainer:
  class: SequentialTrainer
  timesteps: 300000
  environment_info: log
