# skrl PPO configuration for the chassis approach/align task.
# Small MLP (observation 18-D: 9-D bbox[x,y,z,dist,sx,sy,sz,u_ndc,v_ndc] + 2-D chassis_vel
# + 1-D lift + 6-D last_actions[2 frames]) -- input auto-sizes from OBSERVATIONS, NO CNN.
# Reference: https://skrl.readthedocs.io/en/latest/api/agents/ppo.html
seed: 42


# Models: shared-trunk-free, separate Gaussian policy + deterministic value.
models:
  separate: False
  policy:  # GaussianMixin
    class: GaussianMixin
    clip_actions: False
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: -0.6931471805599453   # ln(0.5) —— 回退（ln(0.8) 导致 std 上涨跑飞）
    network:
      - name: net
        input: OBSERVATIONS
        layers: [256, 128, 64]
        activations: elu
    output: ACTIONS
  value:  # DeterministicMixin
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: OBSERVATIONS
        layers: [256, 128, 64]
        activations: elu
    output: ONE


# Rollout memory (size auto-set to agent:rollouts).
memory:
  class: RandomMemory
  memory_size: -1


# PPO agent.
agent:
  class: PPO
  rollouts: 24
  learning_epochs: 5
  mini_batches: 4
  discount_factor: 0.99
  lambda: 0.95
  learning_rate: 3.0e-04   # 由 1e-3 降低：旧 run LR 经 KLAdaptive 爬到 ~1e-2 后在 step7200 发散成 NaN
  learning_rate_scheduler: KLAdaptiveLR
  learning_rate_scheduler_kwargs:
    kl_threshold: 0.01    # 回到 0.008~0.01（旧 0.016 放任 LR 一路爬到 max_lr）
    max_lr: 1.0e-03       # 硬上限：KLAdaptiveLR 默认 max_lr=0.01 是发散根源，钳到 1e-3
    min_lr: 1.0e-05
  state_preprocessor: RunningStandardScaler
  state_preprocessor_kwargs: null
  value_preprocessor: RunningStandardScaler
  value_preprocessor_kwargs: null
  random_timesteps: 0
  learning_starts: 0
  grad_norm_clip: 1.0
  ratio_clip: 0.2
  value_clip: 0.2
  clip_predicted_values: True
  entropy_loss_scale: 0.005   # 由 0.01 回退：配合 ln(0.8) 初值导致 std 不降反升、探索失控
  value_loss_scale: 1.0
  kl_threshold: 0.0
  rewards_shaper_scale: 1.0
  time_limit_bootstrap: True
  # logging and checkpoint
  experiment:
    directory: "chassis_approach"
    experiment_name: ""
    write_interval: auto
    checkpoint_interval: auto
    wandb: true
    wandb_kwargs:
      project: "isaac_rm"


# Trainer.
trainer:
  class: SequentialTrainer
  timesteps: 60000   # 由 24000 提高（旧 run 早早收敛到坏局部最优，需更多步配合课程）
  environment_info: log
